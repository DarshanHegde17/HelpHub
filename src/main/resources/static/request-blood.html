<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Request Blood - HelpHub</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Poppins:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: radial-gradient(circle at top left, rgba(255, 51, 51, 0.22), transparent 35%), radial-gradient(circle at bottom right, rgba(56, 189, 248, 0.18), transparent 35%), linear-gradient(135deg, #020617, #0f172a, #020617);
            color: white;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .grid-bg {
            position: fixed;
            inset: 0;
            background-image: linear-gradient(rgba(255, 255, 255, .04) 1px, transparent 1px), linear-gradient(90deg, rgba(255, 255, 255, .04) 1px, transparent 1px);
            background-size: 45px 45px;
            z-index: -2;
        }

        .blur-circle {
            position: fixed;
            width: 350px;
            height: 350px;
            border-radius: 50%;
            background: rgba(255, 51, 51, .15);
            filter: blur(70px);
            z-index: -1;
            animation: float 6s ease-in-out infinite;
        }

        .blur-circle.one {
            top: 10%;
            left: 5%;
        }

        .blur-circle.two {
            bottom: 10%;
            right: 5%;
            background: rgba(56, 189, 248, .16);
            animation-delay: 2s;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-35px);
            }
        }

        header {
            width: 100%;
            padding: 22px 8%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: fixed;
            top: 0;
            z-index: 1000;
            background: rgba(2, 6, 23, .75);
            backdrop-filter: blur(14px);
            border-bottom: 1px solid rgba(255, 255, 255, .1);
        }

        .logo {
            font-size: 36px;
            font-family: 'Orbitron', sans-serif;
            font-weight: 800;
            background: linear-gradient(90deg, #ff3333, white, #38bdf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            cursor: pointer;
        }

        .nav-btns {
            display: flex;
            gap: 15px;
        }

        .nav-btns a,
        .nav-btns button {
            text-decoration: none;
            color: white;
            padding: 12px 28px;
            border-radius: 35px;
            font-weight: 600;
            transition: .4s;
            border: 1px solid rgba(255, 255, 255, .2);
            background: rgba(255, 255, 255, .08);
            cursor: pointer;
            font-size: 15px;
        }

        .nav-btns a:hover,
        .nav-btns button:hover {
            transform: translateY(-5px);
            box-shadow: 0 0 25px rgba(255, 51, 51, .4);
        }

        .container {
            padding: 120px 8% 80px;
            position: relative;
            z-index: 1;
            max-width: 1400px;
            margin: 0 auto;
        }

        .page-header {
            text-align: center;
            margin-bottom: 50px;
        }

        .page-header h1 {
            font-size: 58px;
            font-family: 'Orbitron', sans-serif;
            background: linear-gradient(90deg, #ff3333, white, #38bdf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 15px;
        }

        .page-header p {
            color: #cbd5e1;
            font-size: 18px;
        }

        .donor-info-card {
            max-width: 600px;
            margin: 0 auto 40px;
            background: rgba(255, 77, 77, 0.15);
            border: 2px solid rgba(255, 77, 77, 0.3);
            border-radius: 20px;
            padding: 25px;
            text-align: center;
        }

        .donor-info-card h3 {
            font-size: 24px;
            margin-bottom: 10px;
            color: #ff6b6b;
        }

        .donor-info-card .blood-badge {
            display: inline-block;
            padding: 8px 20px;
            background: rgba(255, 77, 77, 0.3);
            border: 1px solid rgba(255, 77, 77, 0.5);
            border-radius: 25px;
            font-size: 20px;
            font-weight: 700;
            color: #ff4d4d;
            margin-top: 10px;
        }

        .request-form {
            max-width: 900px;
            margin: 0 auto;
            background: rgba(255, 255, 255, .08);
            border: 1px solid rgba(255, 255, 255, .12);
            border-radius: 30px;
            padding: 50px;
            backdrop-filter: blur(16px);
        }

        .section-title {
            font-size: 28px;
            font-family: 'Orbitron', sans-serif;
            color: #ff3333;
            margin-bottom: 30px;
            padding-bottom: 15px;
            border-bottom: 2px solid rgba(255, 51, 51, .3);
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 25px;
            margin-bottom: 30px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group.full-width {
            grid-column: 1 / -1;
        }

        .form-group label {
            margin-bottom: 10px;
            color: #e2e8f0;
            font-weight: 600;
            font-size: 15px;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            padding: 15px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.08);
            color: white;
            font-size: 15px;
            font-family: 'Poppins', sans-serif;
            transition: 0.3s;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #ff3333;
            background: rgba(255, 255, 255, 0.12);
            box-shadow: 0 0 20px rgba(255, 51, 51, 0.2);
        }

        .form-group input:read-only {
            background: rgba(255, 255, 255, 0.05);
            cursor: not-allowed;
        }

        .form-group select option {
            background: #1a1f2e;
            color: white;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 120px;
        }

        .urgency-selector {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-top: 10px;
        }

        .urgency-option {
            position: relative;
        }

        .urgency-option input[type="radio"] {
            display: none;
        }

        .urgency-card {
            padding: 15px;
            border: 2px solid rgba(255, 255, 255, .15);
            border-radius: 15px;
            background: rgba(255, 255, 255, .05);
            text-align: center;
            cursor: pointer;
            transition: .3s;
        }

        .urgency-option input[type="radio"]:checked + .urgency-card {
            border-color: #ff3333;
            background: rgba(255, 51, 51, .2);
            box-shadow: 0 0 20px rgba(255, 51, 51, .3);
        }

        .urgency-card:hover {
            transform: translateY(-3px);
            border-color: rgba(255, 51, 51, .6);
        }

        .urgency-icon {
            font-size: 30px;
            margin-bottom: 8px;
        }

        .urgency-label {
            font-size: 14px;
            font-weight: 600;
            color: #e2e8f0;
        }

        .submit-btn {
            width: 100%;
            padding: 18px;
            border: none;
            border-radius: 15px;
            background: linear-gradient(135deg, #ff3333, #b80000);
            color: white;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.4s;
            margin-top: 20px;
        }

        .submit-btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 40px rgba(255, 51, 51, 0.4);
        }

        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .status-message {
            margin-top: 20px;
            padding: 15px;
            border-radius: 12px;
            text-align: center;
            font-weight: 600;
            display: none;
        }

        .status-message.success {
            background: rgba(34, 197, 94, 0.2);
            border: 1px solid rgba(34, 197, 94, 0.4);
            color: #4ade80;
        }

        .status-message.error {
            background: rgba(239, 68, 68, 0.2);
            border: 1px solid rgba(239, 68, 68, 0.4);
            color: #f87171;
        }

        @media(max-width:950px) {
            header {
                padding: 20px 5%;
            }

            .container {
                padding: 120px 5% 60px;
            }

            .page-header h1 {
                font-size: 42px;
            }

            .request-form {
                padding: 30px 20px;
            }

            .form-grid {
                grid-template-columns: 1fr;
            }

            .urgency-selector {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>

<body>
    <div class="grid-bg"></div>
    <div class="blur-circle one"></div>
    <div class="blur-circle two"></div>

    <header>
        <div class="logo" onclick="window.location.href='index.html'">HelpHub</div>
        <div class="nav-btns">
            <a href="dashboard.html">Dashboard</a>
            <button onclick="logout()">Logout</button>
        </div>
    </header>

    <div class="container">
        <div class="page-header">
            <h1>Request Blood from Donor</h1>
            <p>Fill in the details to request blood from this donor</p>
        </div>

        <div class="donor-info-card" id="donorInfoCard">
            <h3 id="donorName">Loading donor information...</h3>
            <span class="blood-badge" id="donorBloodGroup">--</span>
        </div>

        <form class="request-form" id="requestForm" onsubmit="submitRequest(event)">
            <h2 class="section-title">Your Information</h2>
            
            <div class="form-grid">
                <div class="form-group">
                    <label for="requesterName">Your Name *</label>
                    <input type="text" id="requesterName" required placeholder="Enter your full name">
                </div>
                <div class="form-group">
                    <label for="requesterEmail">Your Email *</label>
                    <input type="email" id="requesterEmail" required placeholder="Your email" readonly>
                </div>
                <div class="form-group full-width">
                    <label for="requesterPhone">Your Phone Number *</label>
                    <input type="tel" id="requesterPhone" required placeholder="Enter your phone number">
                </div>
            </div>

            <h2 class="section-title">Blood Request Details</h2>
            
            <div class="form-grid">
                <div class="form-group">
                    <label for="bloodGroupNeeded">Blood Group Needed *</label>
                    <select id="bloodGroupNeeded" required>
                        <option value="">Select Blood Group</option>
                        <option value="A+">A+</option>
                        <option value="A-">A-</option>
                        <option value="B+">B+</option>
                        <option value="B-">B-</option>
                        <option value="AB+">AB+</option>
                        <option value="AB-">AB-</option>
                        <option value="O+">O+</option>
                        <option value="O-">O-</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="hospitalName">Hospital Name *</label>
                    <input type="text" id="hospitalName" required placeholder="Enter hospital name">
                </div>
                <div class="form-group full-width">
                    <label for="hospitalLocation">Hospital Location *</label>
                    <input type="text" id="hospitalLocation" required placeholder="Enter hospital address">
                </div>
            </div>

            <div class="form-group">
                <label>Urgency Level *</label>
                <div class="urgency-selector">
                    <div class="urgency-option">
                        <input type="radio" id="critical" name="urgency" value="CRITICAL" required>
                        <label for="critical" class="urgency-card">
                            <div class="urgency-icon">🚨</div>
                            <div class="urgency-label">CRITICAL</div>
                        </label>
                    </div>
                    <div class="urgency-option">
                        <input type="radio" id="high" name="urgency" value="HIGH">
                        <label for="high" class="urgency-card">
                            <div class="urgency-icon">⚠️</div>
                            <div class="urgency-label">HIGH</div>
                        </label>
                    </div>
                    <div class="urgency-option">
                        <input type="radio" id="medium" name="urgency" value="MEDIUM">
                        <label for="medium" class="urgency-card">
                            <div class="urgency-icon">🔔</div>
                            <div class="urgency-label">MEDIUM</div>
                        </label>
                    </div>
                    <div class="urgency-option">
                        <input type="radio" id="low" name="urgency" value="LOW">
                        <label for="low" class="urgency-card">
                            <div class="urgency-icon">📋</div>
                            <div class="urgency-label">LOW</div>
                        </label>
                    </div>
                </div>
            </div>

            <div class="form-group full-width" style="margin-top: 25px;">
                <label for="message">Message / Reason *</label>
                <textarea id="message" required
                    placeholder="Please explain why you need blood and any additional details..."></textarea>
            </div>

            <button type="submit" class="submit-btn" id="submitBtn">Send Blood Request</button>
            <div class="status-message" id="statusMessage"></div>
        </form>
    </div>

    <script>
        let donorData = null;

        // Load donor information from URL parameters
        window.addEventListener('DOMContentLoaded', () => {
            const userEmail = localStorage.getItem('userEmail');
            if (!userEmail) {
                alert('Please login first');
                window.location.href = 'login.html';
                return;
            }

            // Auto-populate requester email
            document.getElementById('requesterEmail').value = userEmail;

            // Get donor information from URL parameters
            const urlParams = new URLSearchParams(window.location.search);
            const donorEmail = urlParams.get('donorEmail');
            const donorName = urlParams.get('donorName');
            const donorBloodGroup = urlParams.get('bloodGroup');

            if (!donorEmail || !donorName) {
                alert('Invalid donor information');
                window.location.href = 'dashboard.html';
                return;
            }

            // Store donor data
            donorData = {
                email: donorEmail,
                name: donorName,
                bloodGroup: donorBloodGroup
            };

            // Display donor information
            document.getElementById('donorName').textContent = `Requesting from: ${donorName}`;
            document.getElementById('donorBloodGroup').textContent = donorBloodGroup || 'Blood Group';

            // Pre-select the donor's blood group if available
            if (donorBloodGroup) {
                document.getElementById('bloodGroupNeeded').value = donorBloodGroup;
            }
        });

        async function submitRequest(event) {
            event.preventDefault();

            const submitBtn = document.getElementById('submitBtn');
            const statusMsg = document.getElementById('statusMessage');

            // Get selected urgency
            const selectedUrgency = document.querySelector('input[name="urgency"]:checked');
            if (!selectedUrgency) {
                statusMsg.textContent = '⚠️ Please select an urgency level';
                statusMsg.className = 'status-message error';
                statusMsg.style.display = 'block';
                return;
            }

            submitBtn.disabled = true;
            submitBtn.textContent = 'Sending Request...';
            statusMsg.style.display = 'none';

            const requestData = {
                requesterName: document.getElementById('requesterName').value,
                requesterEmail: document.getElementById('requesterEmail').value,
                requesterPhone: document.getElementById('requesterPhone').value,
                donorEmail: donorData.email,
                donorName: donorData.name,
                bloodGroupNeeded: document.getElementById('bloodGroupNeeded').value,
                urgencyLevel: selectedUrgency.value,
                hospitalName: document.getElementById('hospitalName').value,
                hospitalLocation: document.getElementById('hospitalLocation').value,
                message: document.getElementById('message').value
            };

            try {
                const response = await fetch('http://localhost:8080/api/blood-requests/create', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(requestData)
                });

                if (response.ok) {
                    statusMsg.textContent = '✓ Blood Request Sent Successfully! The donor will be notified.';
                    statusMsg.className = 'status-message success';
                    statusMsg.style.display = 'block';
                    document.getElementById('requestForm').reset();

                    setTimeout(() => {
                        window.location.href = 'my-requests.html';
                    }, 2500);
                } else {
                    throw new Error('Request failed');
                }
            } catch (error) {
                statusMsg.textContent = '✗ Failed to send request. Please try again.';
                statusMsg.className = 'status-message error';
                statusMsg.style.display = 'block';
                console.error('Error:', error);
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Send Blood Request';
            }
        }

        function logout() {
            if (confirm('Are you sure you want to logout?')) {
                localStorage.removeItem('userEmail');
                localStorage.removeItem('userRole');
                window.location.href = 'index.html';
            }
        }
    </script>
</body>

</html>
