<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register as Donor - HelpHub</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Poppins:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: radial-gradient(circle at top left, rgba(255, 51, 51, 0.22), transparent 35%), radial-gradient(circle at bottom right, rgba(56, 189, 248, 0.18), transparent 35%), linear-gradient(135deg, #020617, #0f172a, #020617);
            color: white;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .grid-bg {
            position: fixed;
            inset: 0;
            background-image: linear-gradient(rgba(255, 255, 255, .04) 1px, transparent 1px), linear-gradient(90deg, rgba(255, 255, 255, .04) 1px, transparent 1px);
            background-size: 45px 45px;
            z-index: -2;
        }

        .blur-circle {
            position: fixed;
            width: 350px;
            height: 350px;
            border-radius: 50%;
            background: rgba(255, 51, 51, .15);
            filter: blur(70px);
            z-index: -1;
            animation: float 6s ease-in-out infinite;
        }

        .blur-circle.one {
            top: 10%;
            left: 5%;
        }

        .blur-circle.two {
            bottom: 10%;
            right: 5%;
            background: rgba(56, 189, 248, .16);
            animation-delay: 2s;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-35px);
            }
        }

        header {
            width: 100%;
            padding: 22px 8%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: fixed;
            top: 0;
            z-index: 1000;
            background: rgba(2, 6, 23, .75);
            backdrop-filter: blur(14px);
            border-bottom: 1px solid rgba(255, 255, 255, .1);
        }

        .logo {
            font-size: 36px;
            font-family: 'Orbitron', sans-serif;
            font-weight: 800;
            background: linear-gradient(90deg, #ff3333, white, #38bdf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            cursor: pointer;
        }

        .nav-btns {
            display: flex;
            gap: 15px;
        }

        .nav-btns a,
        .nav-btns button {
            text-decoration: none;
            color: white;
            padding: 12px 28px;
            border-radius: 35px;
            font-weight: 600;
            transition: .4s;
            border: 1px solid rgba(255, 255, 255, .2);
            background: rgba(255, 255, 255, .08);
            cursor: pointer;
            font-size: 15px;
        }

        .nav-btns a:hover,
        .nav-btns button:hover {
            transform: translateY(-5px);
            box-shadow: 0 0 25px rgba(255, 51, 51, .4);
        }

        .container {
            padding: 120px 8% 80px;
            position: relative;
            z-index: 1;
            max-width: 1400px;
            margin: 0 auto;
        }

        .page-header {
            text-align: center;
            margin-bottom: 50px;
        }

        .page-header h1 {
            font-size: 58px;
            font-family: 'Orbitron', sans-serif;
            background: linear-gradient(90deg, #ff3333, white, #38bdf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 15px;
        }

        .page-header p {
            color: #cbd5e1;
            font-size: 18px;
        }

        .donation-form {
            max-width: 900px;
            margin: 0 auto;
            background: rgba(255, 255, 255, .08);
            border: 1px solid rgba(255, 255, 255, .12);
            border-radius: 30px;
            padding: 50px;
            backdrop-filter: blur(16px);
        }

        .section-title {
            font-size: 28px;
            font-family: 'Orbitron', sans-serif;
            color: #ff3333;
            margin-bottom: 30px;
            padding-bottom: 15px;
            border-bottom: 2px solid rgba(255, 51, 51, .3);
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 25px;
            margin-bottom: 40px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group.full-width {
            grid-column: 1 / -1;
        }

        .form-group label {
            margin-bottom: 10px;
            color: #e2e8f0;
            font-weight: 600;
            font-size: 15px;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            padding: 15px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.08);
            color: white;
            font-size: 15px;
            font-family: 'Poppins', sans-serif;
            transition: 0.3s;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #ff3333;
            background: rgba(255, 255, 255, 0.12);
            box-shadow: 0 0 20px rgba(255, 51, 51, 0.2);
        }

        .form-group select option {
            background: #1a1f2e;
            color: white;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 100px;
        }

        .donation-types {
            margin-bottom: 40px;
        }

        .donation-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .donation-option {
            position: relative;
        }

        .donation-option input[type="checkbox"] {
            display: none;
        }

        .donation-card {
            padding: 25px;
            border: 2px solid rgba(255, 255, 255, .15);
            border-radius: 20px;
            background: rgba(255, 255, 255, .05);
            text-align: center;
            cursor: pointer;
            transition: .3s;
            position: relative;
        }

        .donation-option input[type="checkbox"]:checked+.donation-card {
            border-color: #ff8c00;
            background: rgba(255, 140, 0, .2);
            box-shadow: 0 0 30px rgba(255, 140, 0, .4);
        }

        .donation-card:hover {
            transform: translateY(-5px);
            border-color: rgba(255, 140, 0, .6);
        }

        .donation-icon {
            font-size: 50px;
            margin-bottom: 15px;
        }

        .donation-name {
            font-size: 18px;
            font-weight: 600;
            color: #e2e8f0;
        }

        .checkmark {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 30px;
            height: 30px;
            background: #ff8c00;
            border-radius: 50%;
            display: none;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
        }

        .donation-option input[type="checkbox"]:checked+.donation-card .checkmark {
            display: flex;
        }

        .submit-btn {
            width: 100%;
            padding: 18px;
            border: none;
            border-radius: 15px;
            background: linear-gradient(135deg, #ff3333, #b80000);
            color: white;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.4s;
            margin-top: 20px;
        }

        .submit-btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 40px rgba(255, 51, 51, 0.4);
        }

        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .status-message {
            margin-top: 20px;
            padding: 15px;
            border-radius: 12px;
            text-align: center;
            font-weight: 600;
            display: none;
        }

        .status-message.success {
            background: rgba(34, 197, 94, 0.2);
            border: 1px solid rgba(34, 197, 94, 0.4);
            color: #4ade80;
        }

        .status-message.error {
            background: rgba(239, 68, 68, 0.2);
            border: 1px solid rgba(239, 68, 68, 0.4);
            color: #f87171;
        }

        @media(max-width:950px) {
            header {
                padding: 20px 5%;
            }

            .container {
                padding: 120px 5% 60px;
            }

            .page-header h1 {
                font-size: 42px;
            }

            .donation-form {
                padding: 30px 20px;
            }

            .form-grid {
                grid-template-columns: 1fr;
            }

            .donation-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>

<body>
    <div class="grid-bg"></div>
    <div class="blur-circle one"></div>
    <div class="blur-circle two"></div>

    <header>
        <div class="logo" onclick="window.location.href='index.html'">HelpHub</div>
        <div class="nav-btns">
            <a href="dashboard.html">Dashboard</a>
            <button onclick="logout()">Logout</button>
        </div>
    </header>

    <div class="container">
        <div class="page-header">
            <h1>Register as Donor</h1>
            <p>Fill in your details and select what you want to donate</p>
        </div>

        <form class="donation-form" id="donationForm" onsubmit="submitDonation(event)">
            <h2 class="section-title">Personal Information</h2>
            <div class="form-grid">
                <div class="form-group">
                    <label for="name">Full Name *</label>
                    <input type="text" id="name" required placeholder="Enter your full name">
                </div>
                <div class="form-group">
                    <label for="email">Email Address *</label>
                    <input type="email" id="email" required placeholder="Enter your email">
                </div>
                <div class="form-group">
                    <label for="phone">Phone Number *</label>
                    <input type="tel" id="phone" required placeholder="Enter your phone number">
                </div>
                <div class="form-group">
                    <label for="age">Age *</label>
                    <input type="number" id="age" required min="18" max="65" placeholder="Enter your age">
                </div>
                <div class="form-group">
                    <label for="gender">Gender *</label>
                    <select id="gender" required>
                        <option value="">Select Gender</option>
                        <option value="Male">Male</option>
                        <option value="Female">Female</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="bloodGroup">Blood Group *</label>
                    <select id="bloodGroup" required>
                        <option value="">Select Blood Group</option>
                        <option value="A+">A+</option>
                        <option value="A-">A-</option>
                        <option value="B+">B+</option>
                        <option value="B-">B-</option>
                        <option value="AB+">AB+</option>
                        <option value="AB-">AB-</option>
                        <option value="O+">O+</option>
                        <option value="O-">O-</option>
                    </select>
                </div>
                <div class="form-group full-width">
                    <label for="city">City *</label>
                    <input type="text" id="city" required placeholder="Enter your city">
                </div>
                <div class="form-group full-width">
                    <label for="disease">Medical Conditions (if any)</label>
                    <textarea id="disease"
                        placeholder="Enter any medical conditions, diseases, or health issues (optional)"></textarea>
                </div>
            </div>

            <div class="donation-types">
                <h2 class="section-title">Select What You Want to Donate *</h2>
                <div class="donation-grid">
                    <div class="donation-option">
                        <input type="checkbox" id="blood" name="donationType" value="Blood">
                        <label for="blood" class="donation-card">
                            <span class="checkmark">✓</span>
                            <div class="donation-icon">🩸</div>
                            <div class="donation-name">Blood</div>
                        </label>
                    </div>
                    <div class="donation-option">
                        <input type="checkbox" id="eyes" name="donationType" value="Eyes">
                        <label for="eyes" class="donation-card">
                            <span class="checkmark">✓</span>
                            <div class="donation-icon">👁️</div>
                            <div class="donation-name">Eyes</div>
                        </label>
                    </div>
                    <div class="donation-option">
                        <input type="checkbox" id="kidney" name="donationType" value="Kidney">
                        <label for="kidney" class="donation-card">
                            <span class="checkmark">✓</span>
                            <div class="donation-icon">🫘</div>
                            <div class="donation-name">Kidney</div>
                        </label>
                    </div>
                    <div class="donation-option">
                        <input type="checkbox" id="liver" name="donationType" value="Liver">
                        <label for="liver" class="donation-card">
                            <span class="checkmark">✓</span>
                            <div class="donation-icon">🫀</div>
                            <div class="donation-name">Liver</div>
                        </label>
                    </div>
                    <div class="donation-option">
                        <input type="checkbox" id="heart" name="donationType" value="Heart">
                        <label for="heart" class="donation-card">
                            <span class="checkmark">✓</span>
                            <div class="donation-icon">❤️</div>
                            <div class="donation-name">Heart</div>
                        </label>
                    </div>
                    <div class="donation-option">
                        <input type="checkbox" id="lungs" name="donationType" value="Lungs">
                        <label for="lungs" class="donation-card">
                            <span class="checkmark">✓</span>
                            <div class="donation-icon">🫁</div>
                            <div class="donation-name">Lungs</div>
                        </label>
                    </div>
                    <div class="donation-option">
                        <input type="checkbox" id="pancreas" name="donationType" value="Pancreas">
                        <label for="pancreas" class="donation-card">
                            <span class="checkmark">✓</span>
                            <div class="donation-icon">🩺</div>
                            <div class="donation-name">Pancreas</div>
                        </label>
                    </div>
                    <div class="donation-option">
                        <input type="checkbox" id="skin" name="donationType" value="Skin">
                        <label for="skin" class="donation-card">
                            <span class="checkmark">✓</span>
                            <div class="donation-icon">🤲</div>
                            <div class="donation-name">Skin</div>
                        </label>
                    </div>
                </div>
            </div>

            <button type="submit" class="submit-btn" id="submitBtn">Register as Donor</button>
            <div class="status-message" id="statusMessage"></div>
        </form>
    </div>

    <script>
        async function submitDonation(event) {
            event.preventDefault();

            const submitBtn = document.getElementById('submitBtn');
            const statusMsg = document.getElementById('statusMessage');

            // Get selected donation types
            const checkboxes = document.querySelectorAll('input[name="donationType"]:checked');
            if (checkboxes.length === 0) {
                statusMsg.textContent = '⚠️ Please select at least one donation type';
                statusMsg.className = 'status-message error';
                statusMsg.style.display = 'block';
                return;
            }

            const donationTypes = Array.from(checkboxes).map(cb => cb.value).join(', ');

            submitBtn.disabled = true;
            submitBtn.textContent = 'Registering...';
            statusMsg.style.display = 'none';

            const donorData = {
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                phone: document.getElementById('phone').value,
                gender: document.getElementById('gender').value,
                age: parseInt(document.getElementById('age').value),
                bloodGroup: document.getElementById('bloodGroup').value,
                city: document.getElementById('city').value,
                disease: document.getElementById('disease').value || 'None',
                availability: 'AVAILABLE',
                location: donationTypes // Store donation types in location field temporarily
            };

            try {
                const response = await fetch('http://localhost:8080/api/donors/add', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(donorData)
                });

                if (response.ok) {
                    statusMsg.textContent = '✓ Registration Successful! Thank you for your noble decision.';
                    statusMsg.className = 'status-message success';
                    statusMsg.style.display = 'block';
                    document.getElementById('donationForm').reset();

                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 2500);
                } else {
                    throw new Error('Registration failed');
                }
            } catch (error) {
                statusMsg.textContent = '✗ Registration failed. Please try again.';
                statusMsg.className = 'status-message error';
                statusMsg.style.display = 'block';
                console.error('Error:', error);
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Register as Donor';
            }
        }

        function logout() {
            if (confirm('Are you sure you want to logout?')) {
                window.location.href = 'index.html';
            }
        }
    </script>
</body>

</html>
