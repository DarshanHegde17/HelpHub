<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emergency Request - HelpHub</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Poppins:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: radial-gradient(circle at top left, rgba(255, 51, 51, 0.22), transparent 35%), radial-gradient(circle at bottom right, rgba(56, 189, 248, 0.18), transparent 35%), linear-gradient(135deg, #020617, #0f172a, #020617);
            color: white;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .grid-bg {
            position: fixed;
            inset: 0;
            background-image: linear-gradient(rgba(255, 255, 255, .04) 1px, transparent 1px), linear-gradient(90deg, rgba(255, 255, 255, .04) 1px, transparent 1px);
            background-size: 45px 45px;
            z-index: -2;
        }

        .blur-circle {
            position: fixed;
            width: 350px;
            height: 350px;
            border-radius: 50%;
            background: rgba(255, 51, 51, .15);
            filter: blur(70px);
            z-index: -1;
            animation: float 6s ease-in-out infinite;
        }

        .blur-circle.one {
            top: 10%;
            left: 5%;
        }

        .blur-circle.two {
            bottom: 10%;
            right: 5%;
            background: rgba(56, 189, 248, .16);
            animation-delay: 2s;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-35px);
            }
        }

        header {
            width: 100%;
            padding: 22px 8%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: fixed;
            top: 0;
            z-index: 1000;
            background: rgba(2, 6, 23, .75);
            backdrop-filter: blur(14px);
            border-bottom: 1px solid rgba(255, 255, 255, .1);
        }

        .logo {
            font-size: 36px;
            font-family: 'Orbitron', sans-serif;
            font-weight: 800;
            background: linear-gradient(90deg, #ff3333, white, #38bdf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            cursor: pointer;
        }

        .nav-btns {
            display: flex;
            gap: 15px;
        }

        .nav-btns a,
        .nav-btns button {
            text-decoration: none;
            color: white;
            padding: 12px 28px;
            border-radius: 35px;
            font-weight: 600;
            transition: .4s;
            border: 1px solid rgba(255, 255, 255, .2);
            background: rgba(255, 255, 255, .08);
            cursor: pointer;
            font-size: 15px;
        }

        .nav-btns a:hover,
        .nav-btns button:hover {
            transform: translateY(-5px);
            box-shadow: 0 0 25px rgba(255, 51, 51, .4);
        }

        .container {
            padding: 120px 8% 80px;
            position: relative;
            z-index: 1;
            max-width: 1400px;
            margin: 0 auto;
        }

        .page-header {
            text-align: center;
            margin-bottom: 50px;
        }

        .page-header h1 {
            font-size: 58px;
            font-family: 'Orbitron', sans-serif;
            background: linear-gradient(90deg, #ff3333, white, #38bdf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 15px;
        }

        .page-header p {
            color: #cbd5e1;
            font-size: 18px;
        }

        .emergency-form {
            max-width: 900px;
            margin: 0 auto;
            background: rgba(255, 255, 255, .08);
            border: 1px solid rgba(255, 255, 255, .12);
            border-radius: 30px;
            padding: 50px;
            backdrop-filter: blur(16px);
        }

        .section-title {
            font-size: 28px;
            font-family: 'Orbitron', sans-serif;
            color: #ff3333;
            margin-bottom: 30px;
            padding-bottom: 15px;
            border-bottom: 2px solid rgba(255, 51, 51, .3);
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 25px;
            margin-bottom: 40px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group.full-width {
            grid-column: 1 / -1;
        }

        .form-group label {
            margin-bottom: 10px;
            color: #e2e8f0;
            font-weight: 600;
            font-size: 15px;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            padding: 15px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.08);
            color: white;
            font-size: 15px;
            font-family: 'Poppins', sans-serif;
            transition: 0.3s;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #ff3333;
            background: rgba(255, 255, 255, 0.12);
            box-shadow: 0 0 20px rgba(255, 51, 51, 0.2);
        }

        .form-group select option {
            background: #1a1f2e;
            color: white;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 120px;
        }

        .emergency-types {
            margin-bottom: 40px;
        }

        .emergency-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .emergency-option {
            position: relative;
        }

        .emergency-option input[type="radio"] {
            display: none;
        }

        .emergency-card {
            padding: 25px;
            border: 2px solid rgba(255, 255, 255, .15);
            border-radius: 20px;
            background: rgba(255, 255, 255, .05);
            text-align: center;
            cursor: pointer;
            transition: .3s;
            position: relative;
        }

        .emergency-option input[type="radio"]:checked+.emergency-card {
            border-color: #ff8c00;
            background: rgba(255, 140, 0, .2);
            box-shadow: 0 0 30px rgba(255, 140, 0, .4);
        }

        .emergency-card:hover {
            transform: translateY(-5px);
            border-color: rgba(255, 140, 0, .6);
        }

        .emergency-icon {
            font-size: 50px;
            margin-bottom: 15px;
        }

        .emergency-name {
            font-size: 18px;
            font-weight: 600;
            color: #e2e8f0;
        }

        .checkmark {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 30px;
            height: 30px;
            background: #ff8c00;
            border-radius: 50%;
            display: none;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
        }

        .emergency-option input[type="radio"]:checked+.emergency-card .checkmark {
            display: flex;
        }

        .submit-btn {
            width: 100%;
            padding: 18px;
            border: none;
            border-radius: 15px;
            background: linear-gradient(135deg, #ff3333, #b80000);
            color: white;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.4s;
            margin-top: 20px;
        }

        .submit-btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 40px rgba(255, 51, 51, 0.4);
        }

        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .status-message {
            margin-top: 20px;
            padding: 15px;
            border-radius: 12px;
            text-align: center;
            font-weight: 600;
            display: none;
        }

        .status-message.success {
            background: rgba(34, 197, 94, 0.2);
            border: 1px solid rgba(34, 197, 94, 0.4);
            color: #4ade80;
        }

        .status-message.error {
            background: rgba(239, 68, 68, 0.2);
            border: 1px solid rgba(239, 68, 68, 0.4);
            color: #f87171;
        }

        @media(max-width:950px) {
            header {
                padding: 20px 5%;
            }

            .container {
                padding: 120px 5% 60px;
            }

            .page-header h1 {
                font-size: 42px;
            }

            .emergency-form {
                padding: 30px 20px;
            }

            .form-grid {
                grid-template-columns: 1fr;
            }

            .emergency-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>

<body>
    <div class="grid-bg"></div>
    <div class="blur-circle one"></div>
    <div class="blur-circle two"></div>

    <header>
        <div class="logo" onclick="window.location.href='index.html'">HelpHub</div>
        <div class="nav-btns">
            <a href="dashboard.html">Dashboard</a>
            <button onclick="logout()">Logout</button>
        </div>
    </header>

    <div class="container">
        <div class="page-header">
            <h1>Emergency Request</h1>
            <p>Submit your emergency request and get immediate assistance</p>
        </div>

        <form class="emergency-form" id="emergencyForm" onsubmit="createEmergency(event)">
            <h2 class="section-title">Emergency Details</h2>
            
            <div class="form-grid">
                <div class="form-group">
                    <label for="name">Your Name *</label>
                    <input type="text" id="name" required placeholder="Enter your full name">
                </div>
                <div class="form-group">
                    <label for="email">Email *</label>
                    <input type="email" id="email" required placeholder="Enter your email" readonly>
                </div>
                <div class="form-group">
                    <label for="phone">Phone Number *</label>
                    <input type="tel" id="phone" required placeholder="Enter your phone number">
                </div>
                <div class="form-group">
                    <label for="location">Location *</label>
                    <input type="text" id="location" required placeholder="Enter your current location">
                </div>
                <div class="form-group full-width">
                    <label for="expiryDays">Request Valid For (Days) *</label>
                    <select id="expiryDays" required>
                        <option value="1">1 Day</option>
                        <option value="3">3 Days</option>
                        <option value="7" selected>7 Days (Recommended)</option>
                        <option value="14">14 Days</option>
                        <option value="30">30 Days</option>
                    </select>
                </div>
                <div class="form-group full-width">
                    <label for="description">Emergency Description *</label>
                    <textarea id="description" required
                        placeholder="Describe your emergency situation in detail..."></textarea>
                </div>
            </div>

            <div class="emergency-types">
                <h2 class="section-title">Select Emergency Type *</h2>
                <div class="emergency-grid">
                    <div class="emergency-option">
                        <input type="radio" id="ambulance" name="requestType" value="Ambulance" required>
                        <label for="ambulance" class="emergency-card">
                            <span class="checkmark">✓</span>
                            <div class="emergency-icon">🚑</div>
                            <div class="emergency-name">Ambulance</div>
                        </label>
                    </div>
                    <div class="emergency-option">
                        <input type="radio" id="blood" name="requestType" value="Blood">
                        <label for="blood" class="emergency-card">
                            <span class="checkmark">✓</span>
                            <div class="emergency-icon">🩸</div>
                            <div class="emergency-name">Blood</div>
                        </label>
                    </div>
                    <div class="emergency-option">
                        <input type="radio" id="food" name="requestType" value="Food">
                        <label for="food" class="emergency-card">
                            <span class="checkmark">✓</span>
                            <div class="emergency-icon">🍱</div>
                            <div class="emergency-name">Food</div>
                        </label>
                    </div>
                    <div class="emergency-option">
                        <input type="radio" id="medical" name="requestType" value="Medical Support">
                        <label for="medical" class="emergency-card">
                            <span class="checkmark">✓</span>
                            <div class="emergency-icon">⚕️</div>
                            <div class="emergency-name">Medical Support</div>
                        </label>
                    </div>
                    <div class="emergency-option">
                        <input type="radio" id="volunteer" name="requestType" value="Volunteer Support">
                        <label for="volunteer" class="emergency-card">
                            <span class="checkmark">✓</span>
                            <div class="emergency-icon">🤝</div>
                            <div class="emergency-name">Volunteer</div>
                        </label>
                    </div>
                    <div class="emergency-option">
                        <input type="radio" id="kidney" name="requestType" value="Kidney">
                        <label for="kidney" class="emergency-card">
                            <span class="checkmark">✓</span>
                            <div class="emergency-icon">🫘</div>
                            <div class="emergency-name">Kidney</div>
                        </label>
                    </div>
                    <div class="emergency-option">
                        <input type="radio" id="liver" name="requestType" value="Liver">
                        <label for="liver" class="emergency-card">
                            <span class="checkmark">✓</span>
                            <div class="emergency-icon">🫀</div>
                            <div class="emergency-name">Liver</div>
                        </label>
                    </div>
                    <div class="emergency-option">
                        <input type="radio" id="heart" name="requestType" value="Heart">
                        <label for="heart" class="emergency-card">
                            <span class="checkmark">✓</span>
                            <div class="emergency-icon">❤️</div>
                            <div class="emergency-name">Heart</div>
                        </label>
                    </div>
                    <div class="emergency-option">
                        <input type="radio" id="lungs" name="requestType" value="Lungs">
                        <label for="lungs" class="emergency-card">
                            <span class="checkmark">✓</span>
                            <div class="emergency-icon">🫁</div>
                            <div class="emergency-name">Lungs</div>
                        </label>
                    </div>
                    <div class="emergency-option">
                        <input type="radio" id="eyes" name="requestType" value="Eyes">
                        <label for="eyes" class="emergency-card">
                            <span class="checkmark">✓</span>
                            <div class="emergency-icon">👁️</div>
                            <div class="emergency-name">Eyes</div>
                        </label>
                    </div>
                    <div class="emergency-option">
                        <input type="radio" id="bone" name="requestType" value="Bone Marrow">
                        <label for="bone" class="emergency-card">
                            <span class="checkmark">✓</span>
                            <div class="emergency-icon">🦴</div>
                            <div class="emergency-name">Bone Marrow</div>
                        </label>
                    </div>
                    <div class="emergency-option">
                        <input type="radio" id="skin" name="requestType" value="Skin">
                        <label for="skin" class="emergency-card">
                            <span class="checkmark">✓</span>
                            <div class="emergency-icon">🤲</div>
                            <div class="emergency-name">Skin</div>
                        </label>
                    </div>
                </div>
            </div>

            <button type="submit" class="submit-btn" id="submitBtn">Submit Emergency Request</button>
            <div class="status-message" id="statusMessage"></div>
        </form>
    </div>

    <script>
        // Auto-populate email from localStorage
        window.addEventListener('DOMContentLoaded', () => {
            const userEmail = localStorage.getItem('userEmail');
            if (userEmail) {
                document.getElementById('email').value = userEmail;
            } else {
                // Redirect to login if no email found
                alert('Please login first');
                window.location.href = 'login.html';
            }
        });

        async function createEmergency(event) {
            event.preventDefault();

            const submitBtn = document.getElementById('submitBtn');
            const statusMsg = document.getElementById('statusMessage');

            // Get selected emergency type
            const selectedType = document.querySelector('input[name="requestType"]:checked');
            if (!selectedType) {
                statusMsg.textContent = '⚠️ Please select an emergency type';
                statusMsg.className = 'status-message error';
                statusMsg.style.display = 'block';
                return;
            }

            submitBtn.disabled = true;
            submitBtn.textContent = 'Submitting Request...';
            statusMsg.style.display = 'none';

            const expiryDays = parseInt(document.getElementById('expiryDays').value);
            const expiresAt = new Date();
            expiresAt.setDate(expiresAt.getDate() + expiryDays);

            const requestData = {
                name: document.getElementById("name").value,
                email: document.getElementById("email").value,
                phone: document.getElementById("phone").value,
                requestType: selectedType.value,
                description: document.getElementById("description").value,
                location: document.getElementById("location").value,
                expiresAt: expiresAt.toISOString()
            };

            try {
                const response = await fetch("http://localhost:8080/api/emergency/create", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify(requestData)
                });

                if (response.ok) {
                    const data = await response.json();
                    statusMsg.textContent = '✓ Emergency Request Submitted Successfully! Help is on the way.';
                    statusMsg.className = 'status-message success';
                    statusMsg.style.display = 'block';
                    document.getElementById('emergencyForm').reset();

                    setTimeout(() => {
                        window.location.href = 'my-requests.html';
                    }, 2500);
                } else {
                    throw new Error('Request failed');
                }
            } catch (error) {
                statusMsg.textContent = '✗ Failed to submit request. Please try again.';
                statusMsg.className = 'status-message error';
                statusMsg.style.display = 'block';
                console.error('Error:', error);
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Submit Emergency Request';
            }
        }

        function logout() {
            if (confirm('Are you sure you want to logout?')) {
                localStorage.removeItem('userEmail');
                localStorage.removeItem('userRole');
                window.location.href = 'index.html';
            }
        }
    </script>
</body>

</html>
