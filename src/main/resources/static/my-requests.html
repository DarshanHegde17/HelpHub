<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HelpHub - My Requests</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Poppins:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Poppins', sans-serif;
            position: relative;
            isolation: isolate;
            min-height: 100vh;
            background: linear-gradient(135deg, rgba(255, 77, 77, 0.14), transparent 28%), linear-gradient(315deg, rgba(77, 166, 255, 0.13), transparent 30%), linear-gradient(135deg, #070b16 0%, #101827 46%, #07111f 100%);
            color: white;
            overflow-x: hidden;
        }

        ::selection {
            background: #ff4d4d;
            color: #ffffff;
        }

        #liquidWaveBg {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
            opacity: 0.78;
        }

        .background-shade {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            background: linear-gradient(rgba(255, 255, 255, 0.035) 1px, transparent 1px), linear-gradient(90deg, rgba(255, 255, 255, 0.035) 1px, transparent 1px), linear-gradient(90deg, rgba(7, 11, 22, 0.45), rgba(7, 11, 22, 0.76) 48%, rgba(7, 17, 31, 0.38));
            background-size: 42px 42px, 42px 42px, 100% 100%;
            mask-image: linear-gradient(to bottom, rgba(0, 0, 0, 0.95), rgba(0, 0, 0, 0.55) 62%, rgba(0, 0, 0, 0.9));
        }

        body::before {
            content: '';
            position: fixed;
            width: 100%;
            height: 100%;
            inset: 0;
            background: repeating-linear-gradient(115deg, transparent 0 90px, rgba(255, 77, 77, 0.055) 90px 92px, transparent 92px 180px), repeating-linear-gradient(25deg, transparent 0 120px, rgba(77, 166, 255, 0.05) 120px 122px, transparent 122px 240px);
            opacity: 0.62;
            pointer-events: none;
            z-index: 0;
        }

        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background: linear-gradient(180deg, rgba(7, 11, 22, 0.1) 0%, rgba(7, 11, 22, 0.58) 58%, rgba(7, 11, 22, 0.92) 100%), linear-gradient(90deg, rgba(255, 77, 77, 0.08), transparent 30%, transparent 70%, rgba(77, 166, 255, 0.08));
            opacity: 0.95;
            pointer-events: none;
            z-index: 0;
        }

        body>*:not(#liquidWaveBg):not(.background-shade):not(nav) {
            position: relative;
            z-index: 1;
        }

        nav {
            width: 100%;
            padding: 20px 8%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: fixed;
            top: 0;
            z-index: 1000;
            background: linear-gradient(90deg, rgba(10, 15, 28, 0.72), rgba(25, 18, 28, 0.66), rgba(9, 20, 34, 0.72));
            backdrop-filter: blur(18px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.12);
            box-shadow: 0 18px 50px rgba(0, 0, 0, 0.28);
        }

        .logo {
            font-size: 42px;
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            background: linear-gradient(90deg, #ff4040, #ffffff 48%, #4da6ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 18px rgba(255, 77, 77, 0.35));
            cursor: pointer;
        }

        nav ul {
            display: flex;
            gap: 35px;
            list-style: none;
        }

        nav ul li a {
            text-decoration: none;
            color: white;
            font-weight: 500;
            position: relative;
            transition: 0.3s;
        }

        nav ul li a::after {
            content: '';
            position: absolute;
            left: 0;
            bottom: -8px;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, #ff4d4d, #4da6ff);
            transform: scaleX(0);
            transform-origin: left;
            transition: 0.3s;
        }

        nav ul li a:hover {
            color: #ff4d4d;
        }

        nav ul li a:hover::after {
            transform: scaleX(1);
        }

        .nav-btn {
            padding: 12px 30px;
            border: none;
            border-radius: 40px;
            background: linear-gradient(135deg, #ff4444, #e60000 58%, #ff8a8a);
            color: white;
            font-weight: 600;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: 0.4s;
            box-shadow: 0 12px 35px rgba(255, 38, 38, 0.28);
        }

        .container {
            padding: 120px 8% 80px;
            min-height: 100vh;
        }

        .page-header {
            text-align: center;
            margin-bottom: 60px;
            animation: heroRise 0.9s ease both;
        }

        .page-header h1 {
            font-size: 58px;
            font-family: 'Orbitron', sans-serif;
            background: linear-gradient(90deg, #ffffff, #ff4d4d 48%, #4da6ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 15px;
            filter: drop-shadow(0 0 18px rgba(255, 77, 77, 0.35));
        }

        .page-header p {
            color: #cbd5e1;
            font-size: 18px;
        }

        @keyframes heroRise {
            from {
                opacity: 0;
                transform: translateY(28px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .requests-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 25px;
            margin-top: 40px;
        }

        .request-card {
            position: relative;
            background: linear-gradient(145deg, rgba(255, 255, 255, 0.11), rgba(255, 255, 255, 0.035));
            border: 1px solid rgba(255, 255, 255, 0.13);
            border-radius: 20px;
            padding: 30px;
            transition: 0.4s;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.24);
        }

        .request-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 0 35px rgba(255, 77, 77, 0.3);
        }

        .request-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 20px;
        }

        .blood-type {
            font-size: 48px;
            font-weight: 700;
            background: linear-gradient(135deg, #ff4d4d, #ff8a8a);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1;
        }

        .status-badge {
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .status-badge.pending {
            background: rgba(251, 191, 36, 0.2);
            border: 1px solid rgba(251, 191, 36, 0.4);
            color: #fbbf24;
        }

        .status-badge.fulfilled {
            background: rgba(34, 197, 94, 0.2);
            border: 1px solid rgba(34, 197, 94, 0.4);
            color: #4ade80;
        }

        .status-badge.cancelled {
            background: rgba(239, 68, 68, 0.2);
            border: 1px solid rgba(239, 68, 68, 0.4);
            color: #f87171;
        }

        .request-details {
            display: grid;
            gap: 12px;
        }

        .detail-row {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #cbd5e1;
            font-size: 14px;
        }

        .detail-row .icon {
            color: #ff4d4d;
            font-size: 16px;
            min-width: 20px;
        }

        .detail-row strong {
            color: white;
        }

        .request-description {
            margin-top: 15px;
            padding: 15px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
            color: #e2e8f0;
            font-size: 14px;
            line-height: 1.6;
        }

        .no-requests {
            text-align: center;
            padding: 80px 20px;
            color: #94a3b8;
        }

        .no-requests .icon {
            font-size: 100px;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        .no-requests h3 {
            font-size: 28px;
            margin-bottom: 10px;
            color: #cbd5e1;
        }

        .no-requests p {
            font-size: 16px;
            margin-bottom: 30px;
        }

        .create-request-btn {
            padding: 15px 40px;
            border: none;
            border-radius: 40px;
            background: linear-gradient(135deg, #ff4444, #e60000 58%, #ff8a8a);
            color: white;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: 0.4s;
            box-shadow: 0 12px 35px rgba(255, 38, 38, 0.28);
        }

        .create-request-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 45px rgba(255, 38, 38, 0.4);
        }

        .action-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .edit-btn, .delete-btn {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            font-size: 14px;
        }

        .edit-btn {
            background: linear-gradient(135deg, #4da6ff, #0066cc);
            color: white;
        }

        .edit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(77, 166, 255, 0.4);
        }

        .delete-btn {
            background: linear-gradient(135deg, #ff4444, #cc0000);
            color: white;
        }

        .delete-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(255, 68, 68, 0.4);
        }

        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            z-index: 2000;
            align-items: flex-start;
            justify-content: center;
            animation: fadeIn 0.3s ease;
            padding-top: 50px;
            overflow-y: auto;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: linear-gradient(145deg, rgba(16, 24, 39, 0.95), rgba(7, 11, 22, 0.98));
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 30px;
            padding: 40px;
            max-width: 600px;
            width: 90%;
            max-height: calc(100vh - 100px);
            overflow-y: auto;
            position: relative;
            box-shadow: 0 30px 90px rgba(0, 0, 0, 0.5);
            animation: slideDown 0.4s ease;
            margin-bottom: 50px;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideDown {
            from {
                transform: translateY(-50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .modal-header h2 {
            font-size: 28px;
            font-family: 'Orbitron', sans-serif;
            background: linear-gradient(90deg, #ff4d4d, #ffffff, #4da6ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .close-btn {
            background: none;
            border: none;
            color: white;
            font-size: 32px;
            cursor: pointer;
            transition: 0.3s;
            line-height: 1;
        }

        .close-btn:hover {
            color: #ff4d4d;
            transform: rotate(90deg);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #e2e8f0;
            font-weight: 500;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 14px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.08);
            color: white;
            font-size: 15px;
            font-family: 'Poppins', sans-serif;
            transition: 0.3s;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #ff4d4d;
            background: rgba(255, 255, 255, 0.12);
            box-shadow: 0 0 20px rgba(255, 77, 77, 0.2);
        }

        .form-group select option {
            background: #1a1f2e;
            color: white;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 100px;
        }

        .submit-btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, #ff4444, #df0000 58%, #ff8686);
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.4s;
            margin-top: 10px;
        }

        .submit-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(255, 77, 77, 0.4);
        }

        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .status-message {
            margin-top: 15px;
            padding: 12px;
            border-radius: 10px;
            text-align: center;
            font-weight: 600;
            display: none;
        }

        .status-message.success {
            background: rgba(34, 197, 94, 0.2);
            border: 1px solid rgba(34, 197, 94, 0.4);
            color: #4ade80;
        }

        .status-message.error {
            background: rgba(239, 68, 68, 0.2);
            border: 1px solid rgba(239, 68, 68, 0.4);
            color: #f87171;
        }

        .loading {
            text-align: center;
            padding: 80px 20px;
            color: #cbd5e1;
        }

        .loading .spinner {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(255, 77, 77, 0.2);
            border-top-color: #ff4d4d;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media(max-width:900px) {
            nav ul {
                display: none;
            }

            .page-header h1 {
                font-size: 40px;
            }

            .requests-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <canvas id="liquidWaveBg" aria-hidden="true"></canvas>
    <div class="background-shade" aria-hidden="true"></div>
    
    <nav>
        <div class="logo" onclick="window.location.href='index.html'">HelpHub</div>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="dashboard.html">Dashboard</a></li>
            <li><a href="emergency.html">Emergency</a></li>
            <li><a href="my-requests.html">My Requests</a></li>
        </ul>
        <button class="nav-btn" onclick="logout()">Logout</button>
    </nav>

    <div class="container">
        <div class="page-header">
            <h1>My Requests</h1>
            <p id="userEmailDisplay">View all your requests</p>
        </div>

        <div style="margin-bottom: 40px;">
            <div style="display: flex; justify-content: center; gap: 20px; margin-bottom: 30px;">
                <button onclick="showTab('donations')" id="donationsTab" style="padding: 12px 30px; border: 2px solid #ff4d4d; border-radius: 25px; background: rgba(255, 77, 77, 0.2); color: white; font-weight: 600; cursor: pointer; transition: 0.3s;">
                    🎁 My Donations
                </button>
                <button onclick="showTab('blood')" id="bloodTab" style="padding: 12px 30px; border: 2px solid rgba(255, 255, 255, 0.3); border-radius: 25px; background: rgba(255, 255, 255, 0.05); color: white; font-weight: 600; cursor: pointer; transition: 0.3s;">
                    🩸 Blood Requests
                </button>
                <button onclick="showTab('emergency')" id="emergencyTab" style="padding: 12px 30px; border: 2px solid rgba(255, 255, 255, 0.3); border-radius: 25px; background: rgba(255, 255, 255, 0.05); color: white; font-weight: 600; cursor: pointer; transition: 0.3s;">
                    🚨 Emergency Requests
                </button>
            </div>
        </div>

        <div id="requestsContainer">
            <div class="loading">
                <div class="spinner"></div>
                <h3>Loading your requests...</h3>
            </div>
        </div>
    </div>

    <!-- Add/Edit Donation Modal -->
    <div class="modal" id="donationModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="donationModalTitle">Register as Donor</h2>
                <button class="close-btn" onclick="closeDonationModal()">&times;</button>
            </div>
            <form id="donationForm" onsubmit="submitDonation(event)">
                <input type="hidden" id="donationId">
                <div class="form-group">
                    <label for="donationName">Full Name *</label>
                    <input type="text" id="donationName" required>
                </div>
                <div class="form-group">
                    <label for="donationEmail">Email *</label>
                    <input type="email" id="donationEmail" required readonly>
                </div>
                <div class="form-group">
                    <label for="donationPhone">Phone Number *</label>
                    <input type="tel" id="donationPhone" required>
                </div>
                <div class="form-group">
                    <label for="donationAge">Age *</label>
                    <input type="number" id="donationAge" required min="18" max="65">
                </div>
                <div class="form-group">
                    <label for="donationGender">Gender *</label>
                    <select id="donationGender" required>
                        <option value="">Select Gender</option>
                        <option value="Male">Male</option>
                        <option value="Female">Female</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="donationBloodGroup">Blood Group *</label>
                    <select id="donationBloodGroup" required>
                        <option value="">Select Blood Group</option>
                        <option value="A+">A+</option>
                        <option value="A-">A-</option>
                        <option value="B+">B+</option>
                        <option value="B-">B-</option>
                        <option value="AB+">AB+</option>
                        <option value="AB-">AB-</option>
                        <option value="O+">O+</option>
                        <option value="O-">O-</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="donationCity">City *</label>
                    <input type="text" id="donationCity" required>
                </div>
                <div class="form-group">
                    <label>What to Donate *</label>
                    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:10px;">
                        <label style="display:flex;align-items:center;gap:8px;cursor:pointer;">
                            <input type="checkbox" name="donationType" value="Blood" style="width:auto;">
                            <span>🩸 Blood</span>
                        </label>
                        <label style="display:flex;align-items:center;gap:8px;cursor:pointer;">
                            <input type="checkbox" name="donationType" value="Eyes" style="width:auto;">
                            <span>👁️ Eyes</span>
                        </label>
                        <label style="display:flex;align-items:center;gap:8px;cursor:pointer;">
                            <input type="checkbox" name="donationType" value="Kidney" style="width:auto;">
                            <span>🫘 Kidney</span>
                        </label>
                        <label style="display:flex;align-items:center;gap:8px;cursor:pointer;">
                            <input type="checkbox" name="donationType" value="Liver" style="width:auto;">
                            <span>🫀 Liver</span>
                        </label>
                        <label style="display:flex;align-items:center;gap:8px;cursor:pointer;">
                            <input type="checkbox" name="donationType" value="Heart" style="width:auto;">
                            <span>❤️ Heart</span>
                        </label>
                        <label style="display:flex;align-items:center;gap:8px;cursor:pointer;">
                            <input type="checkbox" name="donationType" value="Lungs" style="width:auto;">
                            <span>🫁 Lungs</span>
                        </label>
                        <label style="display:flex;align-items:center;gap:8px;cursor:pointer;">
                            <input type="checkbox" name="donationType" value="Pancreas" style="width:auto;">
                            <span>🩺 Pancreas</span>
                        </label>
                        <label style="display:flex;align-items:center;gap:8px;cursor:pointer;">
                            <input type="checkbox" name="donationType" value="Skin" style="width:auto;">
                            <span>🤲 Skin</span>
                        </label>
                    </div>
                </div>
                <div class="form-group">
                    <label for="donationDisease">Medical Conditions (if any)</label>
                    <textarea id="donationDisease"></textarea>
                </div>
                <button type="submit" class="submit-btn" id="donationSubmitBtn">Register as Donor</button>
                <div class="status-message" id="donationStatusMessage"></div>
            </form>
        </div>
    </div>

    <!-- Edit Emergency Request Modal -->
    <div class="modal" id="editModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Edit Emergency Request</h2>
                <button class="close-btn" onclick="closeEditModal()">&times;</button>
            </div>
            <form id="editForm" onsubmit="submitEdit(event)">
                <input type="hidden" id="editRequestId">
                <div class="form-group">
                    <label for="editName">Name *</label>
                    <input type="text" id="editName" required>
                </div>
                <div class="form-group">
                    <label for="editPhone">Phone Number *</label>
                    <input type="tel" id="editPhone" required>
                </div>
                <div class="form-group">
                    <label for="editLocation">Location *</label>
                    <input type="text" id="editLocation" required>
                </div>
                <div class="form-group">
                    <label for="editRequestType">Emergency Type *</label>
                    <select id="editRequestType" required>
                        <option value="Ambulance">🚑 Ambulance</option>
                        <option value="Blood">🩸 Blood</option>
                        <option value="Food">🍱 Food</option>
                        <option value="Medical Support">⚕️ Medical Support</option>
                        <option value="Volunteer Support">🤝 Volunteer</option>
                        <option value="Kidney">🫘 Kidney</option>
                        <option value="Liver">🫀 Liver</option>
                        <option value="Heart">❤️ Heart</option>
                        <option value="Lungs">🫁 Lungs</option>
                        <option value="Eyes">👁️ Eyes</option>
                        <option value="Bone Marrow">🦴 Bone Marrow</option>
                        <option value="Skin">🤲 Skin</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="editExpiryDays">Request Valid For (Days) *</label>
                    <select id="editExpiryDays" required>
                        <option value="1">1 Day</option>
                        <option value="3">3 Days</option>
                        <option value="7">7 Days</option>
                        <option value="14">14 Days</option>
                        <option value="30">30 Days</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="editDescription">Description *</label>
                    <textarea id="editDescription" required></textarea>
                </div>
                <button type="submit" class="submit-btn" id="editSubmitBtn">Update Request</button>
                <div class="status-message" id="editStatusMessage"></div>
            </form>
        </div>
    </div>

    <script>
        const waveCanvas = document.getElementById('liquidWaveBg');
        const waveCtx = waveCanvas.getContext('2d');
        const motionQuery = window.matchMedia('(prefers-reduced-motion: reduce)');
        const pointer = { x: 0, y: 0 };
        let width = 0, height = 0, scrollPhase = 0, waveShift = 0, dots = [];

        function resizeWaveCanvas() {
            const pixelRatio = Math.min(window.devicePixelRatio || 1, 2);
            width = window.innerWidth;
            height = window.innerHeight;
            waveCanvas.width = Math.floor(width * pixelRatio);
            waveCanvas.height = Math.floor(height * pixelRatio);
            waveCanvas.style.width = `${width}px`;
            waveCanvas.style.height = `${height}px`;
            waveCtx.setTransform(pixelRatio, 0, 0, pixelRatio, 0, 0);
            const spacing = width < 760 ? 86 : 104;
            dots = [];
            for (let y = spacing * 0.55; y <= height + spacing; y += spacing) {
                for (let x = spacing * 0.45; x <= width + spacing; x += spacing) {
                    dots.push({ x: x + (Math.random() - 0.5) * spacing * 0.34, y: y + (Math.random() - 0.5) * spacing * 0.34, seed: Math.random() * Math.PI * 2 });
                }
            }
        }

        function drawLiquidWave() {
            if (!motionQuery.matches) waveShift += 0.016;
            scrollPhase += (window.scrollY - scrollPhase) * 0.08;
            waveCtx.clearRect(0, 0, width, height);
            waveCtx.fillStyle = '#07111f';
            waveCtx.fillRect(0, 0, width, height);
            waveCtx.lineWidth = 1;
            for (let i = 0; i < dots.length; i++) {
                const current = dots[i];
                const cx = current.x + Math.sin(waveShift + current.seed) * 7 + (pointer.x - 0.5) * 10;
                const cy = current.y + Math.cos(waveShift * 0.8 + current.seed) * 7 + (pointer.y - 0.5) * 8 - scrollPhase * 0.025;
                for (let j = i + 1; j < dots.length; j++) {
                    const next = dots[j];
                    const nx = next.x + Math.sin(waveShift + next.seed) * 7 + (pointer.x - 0.5) * 10;
                    const ny = next.y + Math.cos(waveShift * 0.8 + next.seed) * 7 + (pointer.y - 0.5) * 8 - scrollPhase * 0.025;
                    const distance = Math.hypot(cx - nx, cy - ny);
                    if (distance < 150) {
                        const signal = Math.max(0, Math.sin(waveShift * 2.6 + current.seed + next.seed));
                        const alpha = (1 - distance / 150) * (0.13 + signal * 0.12);
                        waveCtx.strokeStyle = signal > 0.72 ? `rgba(255,77,77,${alpha})` : `rgba(77,166,255,${alpha})`;
                        waveCtx.beginPath();
                        waveCtx.moveTo(cx, cy);
                        waveCtx.lineTo(nx, ny);
                        waveCtx.stroke();
                    }
                }
            }
            for (const dot of dots) {
                const px = dot.x + Math.sin(waveShift + dot.seed) * 7 + (pointer.x - 0.5) * 10;
                const py = dot.y + Math.cos(waveShift * 0.8 + dot.seed) * 7 + (pointer.y - 0.5) * 8 - scrollPhase * 0.025;
                if (px < -40 || px > width + 40 || py < -40 || py > height + 40) continue;
                const beat = Math.max(0, Math.sin(waveShift * 2.4 + dot.seed));
                const alpha = 0.28 + beat * 0.28;
                const radius = 2 + beat * 1.6;
                const isEmergencyNode = Math.sin(dot.seed) > 0.45;
                waveCtx.shadowBlur = isEmergencyNode ? 14 : 10;
                waveCtx.shadowColor = isEmergencyNode ? 'rgba(255,77,77,0.45)' : 'rgba(77,166,255,0.38)';
                waveCtx.beginPath();
                waveCtx.fillStyle = isEmergencyNode ? `rgba(255,77,77,${alpha})` : `rgba(77,166,255,${alpha})`;
                waveCtx.arc(px, py, radius, 0, Math.PI * 2);
                waveCtx.fill();
            }
            waveCtx.shadowBlur = 0;
            requestAnimationFrame(drawLiquidWave);
        }

        window.addEventListener('resize', resizeWaveCanvas);
        window.addEventListener('mousemove', (e) => {
            pointer.x = e.clientX / Math.max(width, 1);
            pointer.y = e.clientY / Math.max(height, 1);
        });
        resizeWaveCanvas();
        drawLiquidWave();

            bloodTab.style.borderColor = 'rgba(255, 255, 255, 0.3)';
            emergencyTab.style.background = 'rgba(255, 255, 255, 0.05)';
            emergencyTab.style.borderColor = 'rgba(255, 255, 255, 0.3)';

                bloodTab.style.borderColor = '#ff4d4d';

            } else {

                emergencyTab.style.borderColor = '#ff4d4d';
                loadEmergencyRequests();
            }
        }

                'Kidney': '🫘',
                'Liver': '🫀',
                'Heart': '❤️',
                'Lungs': '🫁',
                'Pancreas': '🩺',
                'Skin': '🤲'
            };
            
            const types = donationString.split(',').map(t => t.trim());
            return types.map(type => `${iconMap[type] || '🎁'} ${type}`).join(', ');
        }

        // Initialize page
        function initializePage() {
            userEmail = localStorage.getItem('userEmail');
            
            if (!userEmail) {
                window.location.href = 'login.html';
                return;
            }

            document.getElementById('userEmailDisplay').textContent = `Requests for: ${userEmail}`;
            
            // Load donations tab by default
            showTab('donations');
        }

        function logout() {
            if (confirm('Are you sure you want to logout?')) {
                localStorage.removeItem('userEmail');
                localStorage.removeItem('userRole');
                window.location.href = 'index.html';
            }
        }

        // Donation Form Functions
        function showAddDonationForm() {
            document.getElementById('donationModalTitle').textContent = 'Register as Donor';
            document.getElementById('donationForm').reset();
            document.getElementById('donationId').value = '';
            document.getElementById('donationEmail').value = userEmail;
            document.querySelectorAll('input[name="donationType"]').forEach(cb => cb.checked = false);
            document.getElementById('donationSubmitBtn').textContent = 'Register as Donor';
            document.getElementById('donationStatusMessage').style.display = 'none';
            document.getElementById('donationModal').classList.add('active');
        }

        function editDonation(donor) {
            document.getElementById('donationModalTitle').textContent = 'Edit Donation';
            document.getElementById('donationId').value = donor.id;
            document.getElementById('donationName').value = donor.name || '';
            document.getElementById('donationEmail').value = donor.email || '';
            document.getElementById('donationPhone').value = donor.phone || '';
            document.getElementById('donationAge').value = donor.age || '';
            document.getElementById('donationGender').value = donor.gender || '';
            document.getElementById('donationBloodGroup').value = donor.bloodGroup || '';
            document.getElementById('donationCity').value = donor.city || '';
            document.getElementById('donationDisease').value = donor.disease || '';
            
            // Set donation type checkboxes
            document.querySelectorAll('input[name="donationType"]').forEach(cb => cb.checked = false);
            if (donor.location) {
                const selectedTypes = donor.location.split(',').map(t => t.trim());
                document.querySelectorAll('input[name="donationType"]').forEach(cb => {
                    if (selectedTypes.includes(cb.value)) {
                        cb.checked = true;
                    }
                });
            }
            
            document.getElementById('donationSubmitBtn').textContent = 'Update Donation';
            document.getElementById('donationStatusMessage').style.display = 'none';
            document.getElementById('donationModal').classList.add('active');
        }

        function closeDonationModal() {
            document.getElementById('donationModal').classList.remove('active');
            document.getElementById('donationForm').reset();
            document.getElementById('donationStatusMessage').style.display = 'none';
        }

        async function submitDonation(event) {
            event.preventDefault();
            
            const submitBtn = document.getElementById('donationSubmitBtn');
            const statusMsg = document.getElementById('donationStatusMessage');
            const donationId = document.getElementById('donationId').value;

            // Get selected donation types
            const checkboxes = document.querySelectorAll('input[name="donationType"]:checked');
            if (checkboxes.length === 0) {
                statusMsg.textContent = '⚠️ Please select at least one donation type';
                statusMsg.className = 'status-message error';
                statusMsg.style.display = 'block';
                return;
            }

            const donationTypes = Array.from(checkboxes).map(cb => cb.value).join(', ');

            submitBtn.disabled = true;
            submitBtn.textContent = donationId ? 'Updating...' : 'Registering...';
            statusMsg.style.display = 'none';

            const donorData = {
                name: document.getElementById('donationName').value,
                email: document.getElementById('donationEmail').value,
                phone: document.getElementById('donationPhone').value,
                gender: document.getElementById('donationGender').value,
                age: parseInt(document.getElementById('donationAge').value),
                bloodGroup: document.getElementById('donationBloodGroup').value,
                city: document.getElementById('donationCity').value,
                disease: document.getElementById('donationDisease').value || 'None',
                availability: 'AVAILABLE',
                location: donationTypes
            };

            try {
                const url = donationId
                    ? `http://localhost:8080/api/donors/update/${donationId}`
                    : 'http://localhost:8080/api/donors/add';
                const method = donationId ? 'PUT' : 'POST';

                const response = await fetch(url, {
                    method: method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(donorData)
                });

                if (response.ok) {
                    statusMsg.textContent = donationId ? '✓ Donation updated successfully!' : '✓ Registration successful! Thank you for your noble decision.';
                    statusMsg.className = 'status-message success';
                    statusMsg.style.display = 'block';
                    
                    setTimeout(() => {
                        closeDonationModal();
                        loadMyDonations();
                    }, 1500);
                } else {
                    throw new Error('Operation failed');
                }
            } catch (error) {
                statusMsg.textContent = '✗ Operation failed. Please try again.';
                statusMsg.className = 'status-message error';
                statusMsg.style.display = 'block';
                console.error('Error:', error);
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = donationId ? 'Update Donation' : 'Register as Donor';
            }
        }

        async function deleteDonation(id) {
            if (!confirm('Are you sure you want to delete this donation? This action cannot be undone.')) {
                return;
            }

            try {
                const response = await fetch(`http://localhost:8080/api/donors/delete/${id}`, {
                    method: 'DELETE'
                });

                if (response.ok) {
                    alert('✓ Donation deleted successfully!');
                    loadMyDonations();
                } else {
                    throw new Error('Delete failed');
                }
            } catch (error) {
                alert('✗ Failed to delete donation. Please try again.');
                console.error('Error:', error);
            }
        }

        // Edit Emergency Request
        function editEmergencyRequest(request) {
            document.getElementById('editRequestId').value = request.id;
            document.getElementById('editName').value = request.name;
            document.getElementById('editPhone').value = request.phone;
            document.getElementById('editLocation').value = request.location;
            document.getElementById('editRequestType').value = request.requestType;
            document.getElementById('editDescription').value = request.description;
            
            // Calculate days until expiry
            if (request.expiresAt) {
                const expiryDate = new Date(request.expiresAt);
                const now = new Date();
                const daysLeft = Math.ceil((expiryDate - now) / (1000 * 60 * 60 * 24));
                document.getElementById('editExpiryDays').value = daysLeft > 0 ? daysLeft : 7;
            }
            
            document.getElementById('editModal').classList.add('active');
        }

        function closeEditModal() {
            document.getElementById('editModal').classList.remove('active');
            document.getElementById('editForm').reset();
            document.getElementById('editStatusMessage').style.display = 'none';
        }

        async function submitEdit(event) {
            event.preventDefault();
            
            const submitBtn = document.getElementById('editSubmitBtn');
            const statusMsg = document.getElementById('editStatusMessage');
            
            submitBtn.disabled = true;
            submitBtn.textContent = 'Updating...';
            statusMsg.style.display = 'none';

            const requestId = document.getElementById('editRequestId').value;
            const expiryDays = parseInt(document.getElementById('editExpiryDays').value);
            const expiresAt = new Date();
            expiresAt.setDate(expiresAt.getDate() + expiryDays);

            const updatedData = {
                name: document.getElementById('editName').value,
                email: userEmail,
                phone: document.getElementById('editPhone').value,
                location: document.getElementById('editLocation').value,
                requestType: document.getElementById('editRequestType').value,
                description: document.getElementById('editDescription').value,
                expiresAt: expiresAt.toISOString(),
                status: 'PENDING'
            };

            try {
                const response = await fetch(`http://localhost:8080/api/emergency/update/${requestId}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(updatedData)
                });

                if (response.ok) {
                    statusMsg.textContent = '✓ Request Updated Successfully!';
                    statusMsg.className = 'status-message success';
                    statusMsg.style.display = 'block';
                    
                    setTimeout(() => {
                        closeEditModal();
                        loadEmergencyRequests();
                    }, 1500);
                } else {
                    throw new Error('Update failed');
                }
            } catch (error) {
                statusMsg.textContent = '✗ Failed to update request. Please try again.';
                statusMsg.className = 'status-message error';
                statusMsg.style.display = 'block';
                console.error('Error:', error);
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Update Request';
            }
        }

        // Delete Emergency Request
        async function deleteEmergencyRequest(requestId) {
            if (!confirm('Are you sure you want to delete this emergency request? This action cannot be undone.')) {
                return;
            }

            try {
                const response = await fetch(`http://localhost:8080/api/emergency/delete/${requestId}`, {
                    method: 'DELETE'
                });

                if (response.ok) {
                    alert('✓ Request Deleted Successfully!');
                    loadEmergencyRequests();
                } else {
                    throw new Error('Delete failed');
                }
            } catch (error) {
                alert('✗ Failed to delete request. Please try again.');
                console.error('Error:', error);
            }
        }

        // Close modal when clicking outside
        window.onclick = function(event) {
            const editModal = document.getElementById('editModal');
            const donationModal = document.getElementById('donationModal');
            if (event.target === editModal) {
                closeEditModal();
            }
            if (event.target === donationModal) {
                closeDonationModal();
            }
        }

        // Load requests on page load
        initializePage();
    </script>
</body>

</html>
