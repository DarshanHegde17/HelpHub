<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Blood Donors - HelpHub</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Poppins:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: radial-gradient(circle at top left, rgba(255, 51, 51, 0.22), transparent 35%), radial-gradient(circle at bottom right, rgba(56, 189, 248, 0.18), transparent 35%), linear-gradient(135deg, #020617, #0f172a, #020617);
            color: white;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .grid-bg {
            position: fixed;
            inset: 0;
            background-image: linear-gradient(rgba(255, 255, 255, .04) 1px, transparent 1px), linear-gradient(90deg, rgba(255, 255, 255, .04) 1px, transparent 1px);
            background-size: 45px 45px;
            z-index: -2;
        }

        .blur-circle {
            position: fixed;
            width: 350px;
            height: 350px;
            border-radius: 50%;
            background: rgba(255, 51, 51, .15);
            filter: blur(70px);
            z-index: -1;
            animation: float 6s ease-in-out infinite;
        }

        .blur-circle.one {
            top: 10%;
            left: 5%;
        }

        .blur-circle.two {
            bottom: 10%;
            right: 5%;
            background: rgba(56, 189, 248, .16);
            animation-delay: 2s;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-35px);
            }
        }

        header {
            width: 100%;
            padding: 22px 8%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: fixed;
            top: 0;
            z-index: 1000;
            background: rgba(2, 6, 23, .75);
            backdrop-filter: blur(14px);
            border-bottom: 1px solid rgba(255, 255, 255, .1);
        }

        .logo {
            font-size: 36px;
            font-family: 'Orbitron', sans-serif;
            font-weight: 800;
            background: linear-gradient(90deg, #ff3333, white, #38bdf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            cursor: pointer;
        }

        .nav-btns {
            display: flex;
            gap: 15px;
        }

        .nav-btns a,
        .nav-btns button {
            text-decoration: none;
            color: white;
            padding: 12px 28px;
            border-radius: 35px;
            font-weight: 600;
            transition: .4s;
            border: 1px solid rgba(255, 255, 255, .2);
            background: rgba(255, 255, 255, .08);
            cursor: pointer;
            font-size: 15px;
        }

        .nav-btns a:hover,
        .nav-btns button:hover {
            transform: translateY(-5px);
            box-shadow: 0 0 25px rgba(255, 51, 51, .4);
        }

        .container {
            padding: 120px 8% 80px;
            position: relative;
            z-index: 1;
        }

        .page-header {
            text-align: center;
            margin-bottom: 50px;
        }

        .page-header h1 {
            font-size: 58px;
            font-family: 'Orbitron', sans-serif;
            background: linear-gradient(90deg, #ff3333, white, #38bdf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 15px;
        }

        .page-header p {
            color: #cbd5e1;
            font-size: 18px;
        }

        .add-donor-btn {
            display: inline-block;
            padding: 15px 35px;
            background: linear-gradient(135deg, #ff3333, #b80000);
            color: white;
            border: none;
            border-radius: 35px;
            font-weight: 700;
            cursor: pointer;
            transition: .4s;
            margin-bottom: 40px;
            font-size: 16px;
        }

        .add-donor-btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 0 25px rgba(255, 51, 51, .4);
        }

        .donors-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 30px;
        }

        .donor-card {
            background: rgba(255, 255, 255, .08);
            border: 1px solid rgba(255, 255, 255, .12);
            border-radius: 25px;
            padding: 30px;
            transition: .4s;
            position: relative;
        }

        .donor-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 0 35px rgba(255, 51, 51, .25);
        }

        .donor-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, .1);
        }

        .donor-avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ff3333, #38bdf8);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-weight: 700;
            color: white;
            box-shadow: 0 8px 25px rgba(255, 51, 51, .3);
        }

        .donor-info h3 {
            font-size: 22px;
            margin-bottom: 8px;
        }

        .blood-badge {
            display: inline-block;
            padding: 5px 15px;
            background: rgba(255, 51, 51, .2);
            border: 1px solid rgba(255, 51, 51, .4);
            border-radius: 20px;
            font-size: 14px;
            font-weight: 700;
            color: #ff6b6b;
        }

        .donor-details {
            display: grid;
            gap: 12px;
            margin-bottom: 20px;
        }

        .detail-row {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #cbd5e1;
            font-size: 14px;
        }

        .detail-row .icon {
            color: #ff3333;
            font-size: 16px;
            min-width: 20px;
        }

        .card-actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, .1);
        }

        .edit-btn,
        .delete-btn {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 20px;
            font-weight: 600;
            cursor: pointer;
            transition: .3s;
            font-size: 14px;
        }

        .edit-btn {
            background: rgba(56, 189, 248, .2);
            border: 1px solid rgba(56, 189, 248, .4);
            color: #38bdf8;
        }

        .edit-btn:hover {
            background: rgba(56, 189, 248, .3);
            transform: translateY(-3px);
        }

        .delete-btn {
            background: rgba(239, 68, 68, .2);
            border: 1px solid rgba(239, 68, 68, .4);
            color: #ef4444;
        }

        .delete-btn:hover {
            background: rgba(239, 68, 68, .3);
            transform: translateY(-3px);
        }

        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            z-index: 2000;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.3s ease;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: linear-gradient(145deg, rgba(16, 24, 39, 0.95), rgba(7, 11, 22, 0.98));
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 30px;
            padding: 40px;
            max-width: 550px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
            box-shadow: 0 30px 90px rgba(0, 0, 0, 0.5);
            animation: slideUp 0.4s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        @keyframes slideUp {
            from {
                transform: translateY(50px);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .modal-header h2 {
            font-size: 32px;
            font-family: 'Orbitron', sans-serif;
            background: linear-gradient(90deg, #ff3333, white, #38bdf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .close-btn {
            background: none;
            border: none;
            color: white;
            font-size: 32px;
            cursor: pointer;
            transition: 0.3s;
            line-height: 1;
        }

        .close-btn:hover {
            color: #ff3333;
            transform: rotate(90deg);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #e2e8f0;
            font-weight: 500;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 14px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.08);
            color: white;
            font-size: 15px;
            font-family: 'Poppins', sans-serif;
            transition: 0.3s;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #ff3333;
            background: rgba(255, 255, 255, 0.12);
            box-shadow: 0 0 20px rgba(255, 51, 51, 0.2);
        }

        .form-group select option {
            background: #1a1f2e;
            color: white;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }

        .submit-btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, #ff3333, #b80000);
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.4s;
            margin-top: 10px;
        }

        .submit-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(255, 51, 51, 0.4);
        }

        .status-message {
            margin-top: 15px;
            padding: 12px;
            border-radius: 10px;
            text-align: center;
            font-weight: 600;
            display: none;
        }

        .status-message.success {
            background: rgba(34, 197, 94, 0.2);
            border: 1px solid rgba(34, 197, 94, 0.4);
            color: #4ade80;
        }

        .status-message.error {
            background: rgba(239, 68, 68, 0.2);
            border: 1px solid rgba(239, 68, 68, 0.4);
            color: #f87171;
        }

        .no-donors {
            text-align: center;
            padding: 80px 20px;
            color: #94a3b8;
        }

        .no-donors .icon {
            font-size: 100px;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        @media(max-width:950px) {
            header {
                padding: 20px 5%;
            }

            .container {
                padding: 120px 5% 60px;
            }

            .page-header h1 {
                font-size: 42px;
            }

            .donors-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <div class="grid-bg"></div>
    <div class="blur-circle one"></div>
    <div class="blur-circle two"></div>

    <header>
        <div class="logo" onclick="window.location.href='index.html'">HelpHub</div>
        <div class="nav-btns">
            <a href="dashboard.html">Dashboard</a>
            <button onclick="logout()">Logout</button>
        </div>
    </header>

    <div class="container">
        <div class="page-header">
            <h1>Manage Blood Donors</h1>
            <p>View, edit, and manage all registered blood donors</p>
        </div>

        <button class="add-donor-btn" onclick="openAddModal()">+ Add New Donor</button>

        <div class="donors-grid" id="donorsGrid">
            <div class="no-donors">
                <div class="icon">🩸</div>
                <h3>Loading donors...</h3>
            </div>
        </div>
    </div>

    <!-- Add/Edit Donor Modal -->
    <div class="modal" id="donorModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Add New Donor</h2>
                <button class="close-btn" onclick="closeModal()">&times;</button>
            </div>
            <form id="donorForm" onsubmit="submitDonorForm(event)">
                <input type="hidden" id="donorId">
                <div class="form-group">
                    <label for="donorName">Full Name *</label>
                    <input type="text" id="donorName" required placeholder="Enter full name">
                </div>
                <div class="form-group">
                    <label for="donorEmail">Email *</label>
                    <input type="email" id="donorEmail" required placeholder="Enter email">
                </div>
                <div class="form-group">
                    <label for="donorPhone">Phone Number *</label>
                    <input type="tel" id="donorPhone" required placeholder="Enter phone number">
                </div>
                <div class="form-group">
                    <label for="donorGender">Gender *</label>
                    <select id="donorGender" required>
                        <option value="">Select Gender</option>
                        <option value="Male">Male</option>
                        <option value="Female">Female</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="donorAge">Age *</label>
                    <input type="number" id="donorAge" required min="18" max="65" placeholder="Enter age">
                </div>
                <div class="form-group">
                    <label for="donorBloodGroup">Blood Group *</label>
                    <select id="donorBloodGroup" required>
                        <option value="">Select Blood Group</option>
                        <option value="A+">A+</option>
                        <option value="A-">A-</option>
                        <option value="B+">B+</option>
                        <option value="B-">B-</option>
                        <option value="AB+">AB+</option>
                        <option value="AB-">AB-</option>
                        <option value="O+">O+</option>
                        <option value="O-">O-</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="donorCity">City *</label>
                    <input type="text" id="donorCity" required placeholder="Enter city">
                </div>
                <div class="form-group">
                    <label for="donorDisease">Medical Conditions (if any)</label>
                    <textarea id="donorDisease"
                        placeholder="Enter any medical conditions or diseases (optional)"></textarea>
                </div>
                <button type="submit" class="submit-btn" id="submitBtn">Save Donor</button>
                <div class="status-message" id="statusMessage"></div>
            </form>
        </div>
    </div>

    <script>
        async function loadDonors() {
            const donorsGrid = document.getElementById('donorsGrid');
            donorsGrid.innerHTML = '<div class="no-donors"><div class="icon">🩸</div><h3>Loading donors...</h3></div>';

            try {
                const response = await fetch('http://localhost:8080/api/donors/all');
                if (response.ok) {
                    const donors = await response.json();
                    if (donors.length === 0) {
                        donorsGrid.innerHTML = '<div class="no-donors"><div class="icon">🩸</div><h3>No donors registered yet</h3><p>Click "Add New Donor" to register the first donor!</p></div>';
                        return;
                    }

                    donorsGrid.innerHTML = donors.map(donor => `
                        <div class="donor-card">
                            <div class="donor-header">
                                <div class="donor-avatar">${donor.name ? donor.name.charAt(0).toUpperCase() : '?'}</div>
                                <div class="donor-info">
                                    <h3>${donor.name || 'Unknown'}</h3>
                                    <span class="blood-badge">${donor.bloodGroup || 'N/A'}</span>
                                </div>
                            </div>
                            <div class="donor-details">
                                <div class="detail-row"><span class="icon">📧</span> ${donor.email || 'Not provided'}</div>
                                <div class="detail-row"><span class="icon">📱</span> ${donor.phone || 'Not provided'}</div>
                                <div class="detail-row"><span class="icon">🎂</span> ${donor.age ? donor.age + ' years old' : 'Age not provided'}</div>
                                <div class="detail-row"><span class="icon">⚧</span> ${donor.gender || 'Not specified'}</div>
                                <div class="detail-row"><span class="icon">📍</span> ${donor.city || 'Location not provided'}</div>
                                <div class="detail-row"><span class="icon">💊</span> ${donor.disease || 'No medical conditions'}</div>
                                <div class="detail-row"><span class="icon">✓</span> <span style="color:#4ade80">${donor.availability || 'AVAILABLE'}</span></div>
                            </div>
                            <div class="card-actions">
                                <button class="edit-btn" onclick='editDonor(${JSON.stringify(donor)})'>✏️ Edit</button>
                                <button class="delete-btn" onclick="deleteDonor(${donor.id})">🗑️ Delete</button>
                            </div>
                        </div>
                    `).join('');
                } else {
                    throw new Error('Failed to load donors');
                }
            } catch (error) {
                donorsGrid.innerHTML = '<div class="no-donors"><div class="icon">⚠️</div><h3>Failed to load donors</h3><p>Please check your connection and try again.</p></div>';
                console.error('Error:', error);
            }
        }

        function openAddModal() {
            document.getElementById('modalTitle').textContent = 'Add New Donor';
            document.getElementById('donorForm').reset();
            document.getElementById('donorId').value = '';
            document.getElementById('submitBtn').textContent = 'Save Donor';
            document.getElementById('statusMessage').style.display = 'none';
            document.getElementById('donorModal').classList.add('active');
        }

        function editDonor(donor) {
            document.getElementById('modalTitle').textContent = 'Edit Donor';
            document.getElementById('donorId').value = donor.id;
            document.getElementById('donorName').value = donor.name || '';
            document.getElementById('donorEmail').value = donor.email || '';
            document.getElementById('donorPhone').value = donor.phone || '';
            document.getElementById('donorGender').value = donor.gender || '';
            document.getElementById('donorAge').value = donor.age || '';
            document.getElementById('donorBloodGroup').value = donor.bloodGroup || '';
            document.getElementById('donorCity').value = donor.city || '';
            document.getElementById('donorDisease').value = donor.disease || '';
            document.getElementById('submitBtn').textContent = 'Update Donor';
            document.getElementById('statusMessage').style.display = 'none';
            document.getElementById('donorModal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('donorModal').classList.remove('active');
            document.getElementById('donorForm').reset();
            document.getElementById('statusMessage').style.display = 'none';
        }

        async function submitDonorForm(event) {
            event.preventDefault();
            const submitBtn = document.getElementById('submitBtn');
            const statusMsg = document.getElementById('statusMessage');
            const donorId = document.getElementById('donorId').value;

            submitBtn.disabled = true;
            submitBtn.textContent = donorId ? 'Updating...' : 'Saving...';
            statusMsg.style.display = 'none';

            const donorData = {
                name: document.getElementById('donorName').value,
                email: document.getElementById('donorEmail').value,
                phone: document.getElementById('donorPhone').value,
                gender: document.getElementById('donorGender').value,
                age: parseInt(document.getElementById('donorAge').value),
                bloodGroup: document.getElementById('donorBloodGroup').value,
                city: document.getElementById('donorCity').value,
                disease: document.getElementById('donorDisease').value || 'None',
                availability: 'AVAILABLE'
            };

            try {
                const url = donorId
                    ? `http://localhost:8080/api/donors/update/${donorId}`
                    : 'http://localhost:8080/api/donors/add';
                const method = donorId ? 'PUT' : 'POST';

                const response = await fetch(url, {
                    method: method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(donorData)
                });

                if (response.ok) {
                    statusMsg.textContent = donorId ? '✓ Donor updated successfully!' : '✓ Donor added successfully!';
                    statusMsg.className = 'status-message success';
                    statusMsg.style.display = 'block';
                    document.getElementById('donorForm').reset();
                    setTimeout(() => {
                        closeModal();
                        loadDonors();
                    }, 1500);
                } else {
                    throw new Error('Operation failed');
                }
            } catch (error) {
                statusMsg.textContent = '✗ Operation failed. Please try again.';
                statusMsg.className = 'status-message error';
                statusMsg.style.display = 'block';
                console.error('Error:', error);
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = donorId ? 'Update Donor' : 'Save Donor';
            }
        }

        async function deleteDonor(id) {
            if (!confirm('Are you sure you want to delete this donor? This action cannot be undone.')) {
                return;
            }

            try {
                const response = await fetch(`http://localhost:8080/api/donors/delete/${id}`, {
                    method: 'DELETE'
                });

                if (response.ok) {
                    alert('✓ Donor deleted successfully!');
                    loadDonors();
                } else {
                    throw new Error('Delete failed');
                }
            } catch (error) {
                alert('✗ Failed to delete donor. Please try again.');
                console.error('Error:', error);
            }
        }

        function logout() {
            if (confirm('Are you sure you want to logout?')) {
                window.location.href = 'index.html';
            }
        }

        window.onclick = function (event) {
            const modal = document.getElementById('donorModal');
            if (event.target === modal) {
                closeModal();
            }
        }

        loadDonors();
    </script>
</body>

</html>
